services:
  job-scheduler:
    image: ghcr.io/epsilon-data/job-scheduler:latest
    container_name: job-scheduler
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - SESSION_SECRET=${SESSION_SECRET}
      # Keycloak Configuration
      - KEYCLOAK_BASE_URL=${KEYCLOAK_BASE_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-epsilon}
      - KEYCLOAK_AUTH_URL=${KEYCLOAK_AUTH_URL}
      - KEYCLOAK_TOKEN_URL=${KEYCLOAK_TOKEN_URL}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-jobscheduler-oauth}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_REDIRECT_URI=${KEYCLOAK_REDIRECT_URI}
      # GitHub OAuth Configuration
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # Feature Flags
      - AI_ENABLED=${AI_ENABLED:-true}
      - ZKP_ENABLED=${ZKP_ENABLED:-true}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - job-scheduler-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  job-scheduler-network:
    driver: bridge
