name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # CI: Runs on all PRs to main
  # ==========================================
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      # Add more checks as needed:
      # - name: Lint
      #   run: npm run lint
      # - name: Test
      #   run: npm run test
